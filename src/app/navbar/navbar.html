<nav class="navbar">
  <div class="nav-container">
    <a routerLink="/" class="logo" (click)="closeMenu()">
      <span class="accent">&lt;</span>Kyriakidis<span class="accent">/&gt;</span>
    </a>
    <div class="nav-links desktop-only">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">{{ 'NAV.HOME' | translate }}</a>
      <a routerLink="/projects" routerLinkActive="active">{{ 'NAV.PROJECTS' | translate }}</a>
      <a routerLink="/resume" routerLinkActive="active">{{ 'NAV.RESUME' | translate }}</a>

        {{ currentLang === 'el' ? 'EN' : 'ΕΛ' }}
      </button>
    </div>

    <div class="mobile-controls mobile-only">
      <button class="lang-toggle-btn" (click)="toggleLanguage()">
        {{ currentLang === 'el' ? 'EN' : 'ΕΛ' }}
      </button>
      <button class="hamburger" (click)="toggleMenu()" [class.active]="isMobileMenuOpen" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>

  </div>

  <div class="mobile-menu" [class.open]="isMobileMenuOpen">
    <div class="mobile-links">
      <a routerLink="/" (click)="closeMenu()">{{ 'NAV.HOME' | translate }}</a>
      <a routerLink="/projects" (click)="closeMenu()">{{ 'NAV.PROJECTS' | translate }}</a>
      <a routerLink="/resume" (click)="closeMenu()">{{ 'NAV.RESUME' | translate }}</a>
