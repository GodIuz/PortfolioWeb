<div class="search-container">
  <div class="search-wrapper">
    <i class="fa-solid fa-magnifying-glass search-icon"></i>
    <input 
      type="text" 
      class="search-input" 
      [placeholder]="'PROJECTS.SEARCH_PLACEHOLDER' | translate"
      (input)="updateSearch($event)"
    >
  </div>
</div>

<div class="empty-state" *ngIf="filteredProjects.length === 0">
  <div class="empty-icon-wrapper">
    <i class="fa-solid fa-ghost"></i> 
  </div>
  <h3>{{ 'PROJECTS.EMPTY_TITLE' | translate }}</h3>
  <p>{{ 'PROJECTS.EMPTY_DESC' | translate }}</p>
  <button class="btn-outline-red" (click)="clearSearch()">
    <i class="fa-solid fa-rotate-right"></i> {{ 'PROJECTS.BTN_RESET' | translate }}
  </button>
</div>

<div class="projects-grid">
    
  <div class="project-card" *ngFor="let project of filteredProjects">
    
    <div class="card-body">
      <div class="card-header">
        <span class="category-tag">{{ project.category }}</span>
        <span class="grade-tag" *ngIf="project.grade">
          <i class="fa-solid fa-star"></i> {{ project.grade }}
        </span>
      </div>
      
      <h3 class="card-title">{{ project.title }}</h3>
      
      <p class="card-desc">{{ project.description | translate }}</p>
      
      <div class="tech-stack">
        <span class="tech-item" *ngFor="let tech of project.techStack">{{ tech }}</span>
      </div>
      
      <div class="architecture-section" *ngIf="project.title === 'Smooth Journey'">
        <h4 class="arch-title"><i class="fa-solid fa-sitemap"></i> System Architecture</h4>
      </div>
      
      <div class="card-actions" *ngIf="project.link">
        <a [href]="project.link" target="_blank" class="btn-view">
          {{ 'PROJECTS.BTN_VIEW' | translate }} <i class="fa-solid fa-arrow-right"></i>
        </a>
      </div>
    </div>
    
  </div>

</div>
